user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M; # Büyük dosya/doküman yüklemeleri (RAG) için gerekli

    # Gzip Sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Upstream Tanımlamaları (Docker iç ağındaki servis isimleri)
    upstream open_webui_backend {
        server open-webui:8080;
    }

    upstream n8n_backend {
        server n8n:5678;
    }

    # ============================================
    # Open WebUI - HTTP -> HTTPS Yönlendirmesi
    # ============================================
    server {
        listen 80;
        server_name chat.yourdomain.com n8n.yourdomain.com;
        return 301 https://$host$request_uri;
    }

    # ============================================
    # Open WebUI - SSL Yapılandırması
    # ============================================
    server {
        listen 443 ssl;
        server_name chat.yourdomain.com;

        ssl_certificate /etc/nginx/ssl/live/chat.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/chat.yourdomain.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://open_webui_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket Desteği (Ollama akış / streaming yanıtları için kritik)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }

    # ============================================
    # n8n - SSL Yapılandırması
    # ============================================
    server {
        listen 443 ssl;
        server_name n8n.yourdomain.com;

        ssl_certificate /etc/nginx/ssl/live/n8n.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/n8n.yourdomain.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://n8n_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket Desteği (n8n canlı log akışı için gerekli)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}
